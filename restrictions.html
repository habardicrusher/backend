<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الحظر</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
table { width:100%; border-collapse: collapse; margin-top:20px; }
td,th { padding:10px; border:1px solid #444; text-align:center; }
</style>

</head>

<body>

<h2>قائمة الحظر</h2>

<select id="truckSelect"></select>
<select id="factorySelect"></select>
<input id="reason" placeholder="السبب">
<button onclick="addRestriction()">إضافة</button>

<table>
<thead>
<tr>
<th>السيارة</th>
<th>السائق</th>
<th>المصانع</th>
<th>السبب</th>
<th>الحالة</th>
<th>التاريخ</th>
<th>إجراء</th>
</tr>
</thead>
<tbody id="restrictionsBody"></tbody>
</table>

<script>
const API_BASE = '/api';
let trucks = [], factories = [], restrictions = [];

async function apiCall(endpoint, method='GET', data=null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (data) opts.body = JSON.stringify(data);
    const res = await fetch(API_BASE + endpoint, opts);
    return res.json();
}

async function loadData() {
    const settings = await apiCall('/settings');

    factories = (settings.factories || []).map(f =>
        typeof f === 'object' ? (f.name || '') : f
    );

    trucks = (settings.trucks || []).map(t =>
        typeof t === 'object'
            ? { number: t.number, driver: t.driver }
            : { number: t, driver: t }
    );

    restrictions = await apiCall('/restrictions');

    // ✅ إصلاح المشكلة هنا
    restrictions = restrictions.map(r => ({
        ...r,
        restrictedFactories: Array.isArray(r.restrictedFactories)
            ? r.restrictedFactories
            : (r.restrictedFactories ? [r.restrictedFactories] : [])
    }));

    render();
}

function render() {
    document.getElementById('restrictionsBody').innerHTML =
        restrictions.map(r => `
        <tr>
            <td>${r.truckNumber}</td>
            <td>${r.driverName}</td>
            <td>${(r.restrictedFactories || []).join(', ')}</td>
            <td>${r.reason || '-'}</td>
            <td>${r.active ? 'محظور' : 'مفكوك'}</td>
            <td>${r.createdAt ? new Date(r.createdAt).toLocaleDateString() : '-'}</td>
            <td>
                <button onclick="deleteRestriction(${r.id})">حذف</button>
            </td>
        </tr>
    `).join('');
}

async function addRestriction() {
    const truck = document.getElementById('truckSelect').value;
    const factory = document.getElementById('factorySelect').value;
    const reason = document.getElementById('reason').value;

    await apiCall('/restrictions','POST',{
        truckNumber: truck,
        driverName: truck,
        restrictedFactories: [factory],
        reason: reason,
        active:true
    });

    loadData();
}

async function deleteRestriction(id){
    await apiCall('/restrictions/'+id,'DELETE');
    loadData();
}

loadData();
</script>

</body>
</html>
