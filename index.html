<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة - نظام إدارة طلبات البحص</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .header h1 { font-size: 2.5em; }
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .nav-link {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s;
            font-weight: 600;
        }
        .nav-link:hover, .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transform: translateY(-2px);
        }
        .date-section {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .date-section input[type="date"] {
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-size: 1.1em;
            background: #fff;
            color: #333;
            cursor: pointer;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff; }
        .btn-info { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #fff; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card h3 { font-size: 2.5em; color: #667eea; margin-bottom: 10px; }
        .stat-card p { color: #a8b2d1; }
        .order-item, .dist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 8px;
            border-right: 3px solid #667eea;
        }
        .section-title { margin: 25px 0 15px 0; color: #667eea; font-size: 1.4em; }
        .toast-container { position: fixed; top: 20px; left: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 25px; border-radius: 10px; color: #fff; font-weight: 600; animation: slideIn 0.3s ease; }
        .toast-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .toast-error { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; flex-direction:column; }
        .loading.active { display: flex; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.3); border-top-color:#667eea; border-radius:50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .connection-status { position: fixed; bottom: 20px; right: 20px; padding: 8px 16px; border-radius: 25px; font-size: 0.8em; background: rgba(56,239,125,0.2); border:1px solid #38ef7d; color:#38ef7d; }
        @media (max-width:768px){ .header h1 { font-size:1.5em; } }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="connection-status" id="connectionStatus">✅ متصل بالسيرفر</div>

    <div class="container">
        <div class="header">
            <h1>🚛 لوحة القيادة</h1>
            <p>نظام إدارة طلبات البحص</p>
        </div>

        <div class="nav-links">
            <a href="index.html" class="nav-link active">📊 الرئيسية</a>
            <a href="orders.html" class="nav-link">📝 الطلبات</a>
            <a href="distribution.html" class="nav-link">🚚 التوزيع</a>
            <a href="trucks.html" class="nav-link">🚛 السيارات</a>
            <a href="products.html" class="nav-link">📦 أنواع البحص</a>
            <a href="factories.html" class="nav-link">🏭 المصانع</a>
            <a href="reports.html" class="nav-link">📊 التقارير</a>
            <a href="settings.html" class="nav-link">⚙️ الإعدادات</a>
        </div>

        <div class="date-section">
            <div><label>📅 تاريخ العمل: </label><input type="date" id="orderDate" onchange="loadDashboardData()"></div>
            <div><button class="btn btn-success" onclick="exportDataToFile()">💾 نسخة احتياطية</button>
            <button class="btn btn-info" onclick="exportToExcel()">📥 تصدير Excel</button></div>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><h3 id="todayOrdersCount">0</h3><p>📋 طلبات اليوم</p></div>
            <div class="stat-card"><h3 id="totalTrucksCount">0</h3><p>🚛 إجمالي السيارات</p></div>
            <div class="stat-card"><h3 id="distributedCount">0</h3><p>✅ تم توزيعها</p></div>
            <div class="stat-card"><h3 id="totalTripsCount">0</h3><p>📊 إجمالي الرحلات (آخر 30 يوم)</p></div>
        </div>

        <h2 class="section-title">📋 أحدث الطلبات</h2>
        <div id="recentOrders"></div>

        <h2 class="section-title">🚚 أحدث التوزيعات</h2>
        <div id="recentDistributions"></div>
    </div>

    <script>
        const API_BASE = '/api';
        let trucks = [], orders = [], distribution = [], currentDate = '';

        async function apiCall(endpoint, method = 'GET', data = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
            if (data && (method === 'POST' || method === 'PUT')) options.body = JSON.stringify(data);
            const res = await fetch(`${API_BASE}${endpoint}`, options);
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function loadSettings() {
            try {
                const data = await apiCall('/settings');
                trucks = data.trucks || [];
                document.getElementById('totalTrucksCount').innerText = trucks.length;
            } catch(e) { showToast('خطأ في تحميل الإعدادات', 'error'); }
        }

        async function loadDashboardData() {
            currentDate = document.getElementById('orderDate').value;
            showLoading(true);
            try {
                const dayData = await apiCall(`/day/${currentDate}`);
                orders = dayData.orders || [];
                distribution = dayData.distribution || [];
                document.getElementById('todayOrdersCount').innerText = orders.length;
                document.getElementById('distributedCount').innerText = distribution.length;
                
                const end = new Date().toISOString().split('T')[0];
                const start = new Date(); start.setDate(start.getDate() - 30);
                const reports = await apiCall(`/reports?startDate=${start.toISOString().split('T')[0]}&endDate=${end}`);
                const totalTrips = reports.allDistributions ? reports.allDistributions.length : 0;
                document.getElementById('totalTripsCount').innerText = totalTrips;
                
                renderRecentOrders();
                renderRecentDistributions();
            } catch(e) { showToast('خطأ في تحميل البيانات', 'error'); }
            showLoading(false);
        }

        function renderRecentOrders() {
            const container = document.getElementById('recentOrders');
            if (!container) return;
            const recent = orders.slice(-10).reverse();
            if (recent.length === 0) { container.innerHTML = '<p style="color:#a8b2d1; text-align:center;">لا توجد طلبات اليوم</p>'; return; }
            container.innerHTML = recent.map((o, i) => `<div class="order-item"><span><strong>#${i+1}</strong></span><span>🏭 ${o.factory}</span><span>📦 ${o.material}</span><span>🕐 ${o.timestamp}</span></div>`).join('');
        }

        function renderRecentDistributions() {
            const container = document.getElementById('recentDistributions');
            if (!container) return;
            const recent = distribution.slice(-10).reverse();
            if (recent.length === 0) { container.innerHTML = '<p style="color:#a8b2d1; text-align:center;">لا توجد توزيعات اليوم</p>'; return; }
            container.innerHTML = recent.map((d, i) => `<div class="order-item"><span><strong>#${i+1}</strong></span><span>🚛 ${d.truck?.number || '?'}</span><span>👤 ${d.truck?.driver || '?'}</span><span>🏭 ${d.factory}</span><span>📦 ${d.material}</span><span>🛣️ رود ${d.road}</span></div>`).join('');
        }

        async function exportDataToFile() {
            showLoading(true);
            try {
                const res = await fetch('/api/backup', { credentials: 'include' });
                const data = await res.json();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                saveAs(blob, `نسخة_احتياطية_${new Date().toISOString().split('T')[0]}.json`);
                showToast('✅ تم التصدير', 'success');
            } catch(e) { showToast('خطأ في التصدير', 'error'); }
            showLoading(false);
        }

        function exportToExcel() {
            if (orders.length === 0) { showToast('لا توجد طلبات', 'error'); return; }
            const ws = XLSX.utils.json_to_sheet(orders.map((o,i)=>({'#':i+1, 'المصنع':o.factory, 'نوع البحص':o.material, 'الوقت':o.timestamp})));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'الطلبات');
            XLSX.writeFile(wb, `طلبات_${currentDate}.xlsx`);
            showToast('✅ تم التصدير', 'success');
        }

        function showToast(msg, type) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        function showLoading(show) { document.getElementById('loading').classList.toggle('active', show); }

        document.addEventListener('DOMContentLoaded', async () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('orderDate').value = today;
            showLoading(true);
            try {
                await loadSettings();
                await loadDashboardData();
                showToast('✅ تم تحميل البيانات', 'success');
            } catch(e) { showToast('⚠️ خطأ في الاتصال', 'error'); }
            showLoading(false);
        });
    </script>
<script src="navbar.js"></script>
</body>
</html>
