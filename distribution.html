<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التوزيع - نظام إدارة طلبات البحص</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; margin-bottom: 30px; position: relative; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .nav-link { padding: 12px 24px; background: rgba(255,255,255,0.1); border-radius: 12px; text-decoration: none; color: #fff; font-weight: 600; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transform: translateY(-2px); }
        .date-section {
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .date-section input[type="date"] { padding: 12px 20px; border-radius: 10px; border: none; background: #fff; color: #333; cursor: pointer; }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff; }
        .btn-danger { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); color: #fff; }
        .btn-info { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: #fff; }
        .btn-warning { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; overflow-x: auto; display: block; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(102,126,234,0.3); font-weight: 600; }
        .road-badge { padding: 5px 15px; border-radius: 20px; font-size: 0.85em; font-weight: 600; display: inline-block; }
        .road-1 { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .road-2 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .time-badge { 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 0.8em; 
            font-weight: 600; 
            display: inline-block; 
            background: rgba(79, 172, 254, 0.3);
            color: #4facfe;
        }
        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        .stat-card {
            flex: 1;
            min-width: 150px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            text-align: center;
        }
        .stat-card h4 { color: #a8b2d1; margin-bottom: 8px; }
        .stat-card .number { font-size: 1.8em; font-weight: bold; }
        .toast-container { position: fixed; top: 20px; left: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 25px; border-radius: 10px; color: #fff; font-weight: 600; animation: slideIn 0.3s ease; }
        .toast-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .toast-error { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .toast-info { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .toast-warning { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; flex-direction:column; }
        .loading.active { display: flex; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.3); border-top-color:#667eea; border-radius:50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .print-btn { background: linear-gradient(135deg, #757f9a 0%, #d7dde8 100%); color: #fff; }
        @media (max-width:768px){ .header h1 { font-size:1.5em; } th, td { font-size:0.75em; padding: 8px; } }
        @media print {
            body { background: white; color: black; }
            .nav-links, .date-section .btn, .btn-danger, .btn-info, .print-btn { display: none; }
            .container { padding: 0; margin: 0; }
            .header { background: #667eea; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .road-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <div class="header"><h1>🚚 التوزيع التلقائي</h1><p>توزيع الطلبات على السيارات مع تجنب تكرار نفس السائق لنفس المصنع (إلا عند الضرورة)</p></div>
        <div class="nav-links" id="navLinks"></div>

        <div class="date-section">
            <div><label>📅 تاريخ العمل: </label><input type="date" id="orderDate" onchange="loadData()"></div>
            <div>
                <button class="btn btn-success" onclick="autoDistribute()">⚡ توزيع تلقائي (ذكي)</button>
                <button class="btn btn-danger" onclick="resetDistribution()">🔄 إعادة التعيين</button>
                <button class="btn print-btn" onclick="window.print()">🖨️ طباعة</button>
            </div>
        </div>

        <!-- إحصائيات سريعة -->
        <div class="stats" id="statsSection" style="display: none;">
            <div class="stat-card"><h4>📋 عدد الطلبات</h4><div class="number" id="statOrders">0</div></div>
            <div class="stat-card"><h4>🚛 عدد السيارات</h4><div class="number" id="statTrucks">0</div></div>
            <div class="stat-card"><h4>✅ تم التوزيع</h4><div class="number" id="statDistributed">0</div></div>
            <div class="stat-card"><h4>🔄 الرود الحالي</h4><div class="number" id="statRoad">-</div></div>
        </div>

        <h2>📋 قائمة التوزيع</h2>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>رقم السيارة</th>
                        <th>السائق</th>
                        <th>المصنع</th>
                        <th>نوع البحص</th>
                        <th>التوقيت</th>
                        <th>الرود</th>
                    </tr>
                </thead>
                <tbody id="distributionTable">
                    <tr><td colspan="7" style="text-align:center; padding:30px;">لا يوجد توزيع بعد</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let trucks = [], orders = [], distribution = [], currentDate = '';

        async function apiCall(endpoint, method = 'GET', data = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
            if (data && (method === 'POST' || method === 'PUT')) options.body = JSON.stringify(data);
            const response = await fetch(`${API_BASE}${endpoint}`, options);
            if (!response.ok) throw new Error(await response.text());
            return response.json();
        }

        async function loadSettings() {
            try {
                const data = await apiCall('/settings');
                trucks = data.trucks || [];
                console.log(`تم تحميل ${trucks.length} سيارة`);
                document.getElementById('statTrucks').textContent = trucks.length;
            } catch (error) {
                console.error('خطأ في تحميل السيارات:', error);
                showToast('خطأ في تحميل بيانات السيارات', 'error');
            }
        }

        async function loadData() {
            currentDate = document.getElementById('orderDate').value;
            try {
                const data = await apiCall(`/day/${currentDate}`);
                orders = data.orders || [];
                distribution = data.distribution || [];
                renderDistribution();
                updateStats();
            } catch (error) {
                console.error('خطأ في تحميل بيانات اليوم:', error);
                orders = [];
                distribution = [];
                renderDistribution();
                updateStats();
            }
        }

        async function saveData() {
            try {
                await apiCall(`/day/${currentDate}`, 'PUT', { orders, distribution });
                return true;
            } catch (error) {
                showToast('خطأ في حفظ التوزيع', 'error');
                return false;
            }
        }

        function updateStats() {
            const statsSection = document.getElementById('statsSection');
            if (orders.length > 0 || distribution.length > 0) {
                statsSection.style.display = 'flex';
                document.getElementById('statOrders').textContent = orders.length;
                document.getElementById('statDistributed').textContent = distribution.length;
            } else {
                statsSection.style.display = 'none';
            }
        }

        // التوزيع الذكي: تجنب إسناد نفس السيارة لنفس المصنع مرتين متتاليتين
        async function autoDistribute() {
            if (orders.length === 0) {
                showToast('لا توجد طلبات لهذا اليوم', 'error');
                return;
            }
            if (trucks.length === 0) {
                showToast('لا توجد سيارات مسجلة', 'error');
                return;
            }

            showLoading(true);
            distribution = [];
            
            // تتبع آخر مصنع تم تخصيصه لكل سيارة (لتجنب التكرار)
            let lastFactoryForTruck = {};
            trucks.forEach(t => { lastFactoryForTruck[t.number] = null; });
            
            // قائمة السيارات المتاحة (كلها في البداية)
            let availableTrucks = [...trucks];
            let road = 1;
            
            // تجميع الطلبات حسب التوقيت (إذا وجد)
            const ordersWithTime = orders.filter(o => o.time && o.time.trim());
            const ordersWithoutTime = orders.filter(o => !o.time || !o.time.trim());
            
            // دالة مساعدة للتوزيع
            async function distributeOrders(orderList) {
                let localAvailableTrucks = [...availableTrucks];
                let localRoad = road;
                const newDistributions = [];
                
                for (let i = 0; i < orderList.length; i++) {
                    const order = orderList[i];
                    const requiredFactory = order.factory;
                    
                    // البحث عن سيارة لم تذهب لنفس المصنع في آخر مرة
                    let selectedTruck = null;
                    let candidateIndex = -1;
                    
                    for (let j = 0; j < localAvailableTrucks.length; j++) {
                        const truck = localAvailableTrucks[j];
                        if (lastFactoryForTruck[truck.number] !== requiredFactory) {
                            selectedTruck = truck;
                            candidateIndex = j;
                            break;
                        }
                    }
                    
                    if (!selectedTruck && localAvailableTrucks.length > 0) {
                        selectedTruck = localAvailableTrucks[0];
                        candidateIndex = 0;
                        console.warn(`اضطرار لتكرار المصنع ${requiredFactory} للسيارة ${selectedTruck.number}`);
                    }
                    
                    if (!selectedTruck) {
                        showToast('خطأ: لا توجد سيارات متاحة للتوزيع', 'error');
                        break;
                    }
                    
                    localAvailableTrucks.splice(candidateIndex, 1);
                    lastFactoryForTruck[selectedTruck.number] = requiredFactory;
                    
                    newDistributions.push({
                        orderId: order.id,
                        orderIndex: i + 1,
                        truck: selectedTruck,
                        factory: order.factory,
                        material: order.material,
                        time: order.time || '',
                        road: localRoad
                    });
                    
                    if (localAvailableTrucks.length === 0) {
                        localAvailableTrucks = [...trucks];
                        localRoad = (localRoad === 1) ? 2 : 1;
                    }
                }
                
                return { newDistributions, finalRoad: localRoad, finalAvailableTrucks: localAvailableTrucks };
            }
            
            // توزيع الطلبات ذات التوقيت أولاً
            let result = await distributeOrders(ordersWithTime);
            distribution.push(...result.newDistributions);
            availableTrucks = result.finalAvailableTrucks;
            road = result.finalRoad;
            
            // ثم توزيع الطلبات بدون توقيت
            result = await distributeOrders(ordersWithoutTime);
            distribution.push(...result.newDistributions);
            road = result.finalRoad;
            
            document.getElementById('statRoad').textContent = road === 1 ? 'رود 1' : 'رود 2';
            
            const success = await saveData();
            showLoading(false);
            if (success) {
                renderDistribution();
                updateStats();
                showToast(`✅ تم توزيع ${distribution.length} طلب على ${trucks.length} سيارة`, 'success');
            }
        }

        async function resetDistribution() {
            if (!confirm('هل أنت متأكد من إعادة تعيين التوزيع؟')) return;
            distribution = [];
            if (await saveData()) {
                renderDistribution();
                updateStats();
                showToast('تم إعادة تعيين التوزيع', 'info');
            }
        }

        function renderDistribution() {
            const tbody = document.getElementById('distributionTable');
            if (!tbody) return;
            if (distribution.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:30px;">لا يوجد توزيع</td></tr>';
                return;
            }
            tbody.innerHTML = distribution.map((d, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td><strong>${d.truck?.number || '?'}</strong></td>
                    <td>${d.truck?.driver || '?'}</td>
                    <td>${d.factory}</td>
                    <td>بحص ${d.material}</td>
                    <td>${d.time ? `<span class="time-badge">⏰ ${d.time}</span>` : '-'}</td>
                    <td><span class="road-badge road-${d.road}">رود ${d.road}</span></td>
                </tr>
            `).join('');
        }

        function showToast(msg, type) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }
        
        function loadNav() {
            fetch('/api/me', { credentials: 'include' })
                .then(r => r.json())
                .then(data => {
                    if (data.user) {
                        document.getElementById('navLinks').innerHTML = `
                            <a href="index.html" class="nav-link">📊 الرئيسية</a>
                            <a href="orders.html" class="nav-link">📝 الطلبات</a>
                            <a href="distribution.html" class="nav-link active">🚚 التوزيع</a>
                            <a href="trucks.html" class="nav-link">🚛 السيارات</a>
                            <a href="products.html" class="nav-link">📦 أنواع البحص</a>
                            <a href="factories.html" class="nav-link">🏭 المصانع</a>
                            <a href="reports.html" class="nav-link">📊 التقارير</a>
                            <a href="settings.html" class="nav-link">⚙️ الإعدادات</a>
                            <a href="restrictions.html" class="nav-link">⛔ الحظر</a>
                            <a href="users.html" class="nav-link">👥 المستخدمين</a>
                            <a href="logs.html" class="nav-link">📜 السجلات</a>
                        `;
                    } else {
                        window.location.href = '/login.html';
                    }
                })
                .catch(() => { window.location.href = '/login.html'; });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            loadNav();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('orderDate').value = today;
            currentDate = today;
            showLoading(true);
            try {
                await loadSettings();
                await loadData();
                showToast('✅ تم تحميل البيانات', 'success');
            } catch (error) {
                console.error(error);
                showToast('⚠️ خطأ في تحميل البيانات', 'error');
            }
            showLoading(false);
        });
    </script>
</body>
</html>
