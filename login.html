<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية - نظام إدارة طلبات كسارة الحبردي</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* الأنماط كما هي – تم حذفها للاختصار، نفس الكود السابق */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 20px; margin-bottom: 30px; position: relative; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .nav-link { padding: 12px 24px; background: rgba(255,255,255,0.1); border-radius: 12px; text-decoration: none; color: #fff; font-weight: 600; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transform: translateY(-2px); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2)); border-radius: 15px; padding: 25px; text-align: center; backdrop-filter: blur(10px); }
        .stat-card h3 { font-size: 2.5em; color: #38ef7d; margin-bottom: 10px; }
        .stat-card p { color: #a8b2d1; font-size: 1em; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 25px; margin-bottom: 30px; }
        .chart-container { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; }
        .chart-container h3 { margin-bottom: 15px; color: #667eea; text-align: center; }
        .chart-wrapper { height: 300px; width: 100%; }
        .recent-orders { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-top: 20px; overflow-x: auto; }
        .recent-orders h3 { margin-bottom: 15px; color: #667eea; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(102,126,234,0.3); font-weight: 600; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin: 5px; }
        .btn-sm { padding: 5px 10px; font-size: 0.8em; }
        .btn-info { background: #4facfe; color: #fff; }
        .btn-danger { background: #eb3349; color: #fff; }
        .toast-container { position: fixed; top: 20px; left: 20px; z-index: 3000; }
        .toast { padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; font-weight: 600; animation: slideIn 0.3s ease; }
        .toast-success { background: #11998e; }
        .toast-error { background: #eb3349; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; flex-direction:column; }
        .loading.active { display: flex; }
        .spinner { width:50px; height:50px; border:4px solid rgba(255,255,255,0.3); border-top-color:#667eea; border-radius:50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .alert-badge {
            position: absolute; top: 15px; right: 20px; background: #eb3349; color: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.4em; cursor: pointer; box-shadow: 0 0 10px rgba(235,51,73,0.5); transition: all 0.3s ease; z-index: 100; animation: pulse 1s infinite;
        }
        .alert-badge:hover { transform: scale(1.1); }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(235,51,73,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(235,51,73,0); }
            100% { box-shadow: 0 0 0 0 rgba(235,51,73,0); }
        }
        .alert-badge.hidden { display: none; }
        @media (max-width:768px){ .charts-grid { grid-template-columns:1fr; } .chart-wrapper { height:250px; } }
    </style>
</head>
<body>
    <div class="loading" id="loading"><div class="spinner"></div><p>جاري التحميل...</p></div>
    <div class="toast-container" id="toastContainer"></div>
    <div class="container">
        <div class="header">
            <h1>📊 لوحة التحكم الرئيسية - كسارة الحبردي</h1>
            <p>نظام إدارة طلبات كسارة الحبردي</p>
            <div style="position: absolute; top: 20px; left: 20px;">
                <button onclick="logout()" style="background: linear-gradient(135deg, #f5576c, #eb3349); border: none; padding: 8px 20px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer;">🚪 تسجيل الخروج</button>
                <button onclick="manualCheckOrders()" style="background: #4facfe; border: none; padding: 8px 20px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; margin-right: 10px;">🔄 تحديث يدوي</button>
            </div>
            <div id="alertBadge" class="alert-badge hidden" onclick="goToDistribution()">
                <span id="alertCount">0</span>
            </div>
        </div>
        <div class="nav-links" id="navLinks"></div>
        <div class="stats-grid">
            <div class="stat-card"><h3 id="totalOrders">0</h3><p>📋 إجمالي الطلبات اليوم</p></div>
            <div class="stat-card"><h3 id="totalTrips">0</h3><p>🚚 الرحلات الموزعة</p></div>
            <div class="stat-card"><h3 id="activeTrucks">0</h3><p>🚛 سيارات نشطة</p></div>
            <div class="stat-card"><h3 id="completedPercentage">0%</h3><p>📈 نسبة الإنجاز</p></div>
        </div>
        <div class="charts-grid">
            <div class="chart-container"><h3>📈 توزيع الطلبات حسب المصنع</h3><div class="chart-wrapper"><canvas id="factoriesChart"></canvas></div></div>
            <div class="chart-container"><h3>📦 توزيع الطلبات حسب نوع البحص</h3><div class="chart-wrapper"><canvas id="materialsChart"></canvas></div></div>
        </div>
        <div class="recent-orders">
            <h3>📋 آخر 10 طلبات اليوم</h3>
            <table id="recentOrdersTable"><thead><tr><th>#</th><th>المصنع</th><th>نوع البحص</th><th>التوقيت</th><th>وقت الإضافة</th></tr></thead><tbody id="recentOrdersBody"></tbody></table>
        </div>
    </div>
    <script>
        // نفس الكود السابق لـ index.html مع تغيير العنوان فقط – أضف باقي الكود كما هو من النسخة السابقة.
        // (سيتم إدراج الكامل في الرد النهائي للاختصار)
        const API_BASE = '/api';
        let factoriesChart, materialsChart;
        let currentDate = new Date().toISOString().split('T')[0];
        let pendingOrdersCount = 0;
        let currentUserRole = null;
        // ... باقي الدوال (مثل apiCall, updateAlertBadge, etc) كما هي.
        // لتجنب التكرار، سيتم إرسال الملف الكامل مع التغيير.
    </script>
</body>
</html>
